name: networkz

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-networkz}
      MYSQL_USER: ${MYSQL_USER:-networkz}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-networkz}
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER:-networkz} -p${MYSQL_PASSWORD:-networkz} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_PUBLISH_PORT:-8025}:8025"   # Web UI (SMTP only reachable within docker network)

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-networkz}:${MYSQL_PASSWORD:-networkz}@mysql:3306/${MYSQL_DATABASE:-networkz}
      UPLOAD_DIR: /data/uploads
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_TLS: "false"
      SMTP_SSL: "false"
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PUBLISH_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
  frontend_node_modules:
