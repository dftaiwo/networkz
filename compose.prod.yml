name: networkz

# Production overlay. Run with:
#   docker compose -f compose.yml -f compose.prod.yml up -d --build
#
# Differences vs. dev:
# - MailHog is disabled (real SMTP creds expected in .env)
# - Backend is not exposed publicly; only via Caddy reverse proxy
# - Frontend is built into a Caddy image that also serves /api proxied to the backend

services:
  mailhog:
    profiles: ["dev-only"]

  backend:
    restart: always
    command: ["bash", "-lc", "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*"]
    environment:
      APP_ENV: prod
    volumes:
      - uploads_data:/data/uploads
    ports: !reset []
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: prod
    image: networkz-web:latest
    restart: always
    environment: !override {}
    volumes: !override
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - uploads_data:/data/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    ports: !override
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
